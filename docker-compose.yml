services:
  app:
    build: .
    ports:
      - "8089:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/liverpool_exam
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
 
