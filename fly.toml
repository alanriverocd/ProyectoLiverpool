app = "exam-backend-8952"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 8080
    handlers = ["http"]

[env]
  SERVER_ADDRESS = "0.0.0.0"
  SERVER_PORT = "8080"

[deploy]
  # allow single-machine deployments for cheaper testing (no HA)
  min_machines_running = 0
